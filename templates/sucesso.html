<!DOCTYPE html>
<html>
<head>
    <title>Sucesso</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5 text-center">

    <div class="card p-4 shadow">

        <h3 class="text-success">✅ Denúncia enviada!</h3>

        <p class="mt-3">Guarde seu número de protocolo:</p>

        <h2 class="text-primary">{{ protocolo }}</h2>

        <!-- BOTÃO -->
        <button onclick="copiar()" class="btn btn-outline-primary mt-2">
            Copiar protocolo
        </button>

        <a href="/" class="btn btn-success mt-4">
            Voltar ao início
        </a>

    </div>

</div>

<!-- SCRIPT -->
<script>
function copiar() {
    navigator.clipboard.writeText("{{ protocolo }}");
    alert("Protocolo copiado!");
}
</script>

</body>
</html>
