<!DOCTYPE html>
<html>
<head>
    <title>Denúncia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body {
    overflow-x: hidden;
}

.container {
    max-width: 100%;
    padding-left: 10px;
    padding-right: 10px;
}

.card {
    width: 100%;
}
</style>

</head>
<body class="bg-light">

<div class="container-fluid py-3">

    <h4 class="text-center mb-4">🐾 Nova Denúncia</h4>

    <div class="card shadow p-4">

        <form method="POST" enctype="multipart/form-data">

            <label class="form-label">Tipo</label>
            <select name="tipo" class="form-select mb-3" required>
                <option value="">Selecione...</option>
                <option>Maus-tratos</option>
                <option>Abandono</option>
                <option>Animal ferido</option>
                <option>Outros</option>
            </select>

            <label class="form-label">Descrição</label>
            <textarea name="descricao" class="form-control mb-3" rows="3" required></textarea>

            <label class="form-label">Localização</label>
            <input type="text" id="localizacao" name="localizacao" class="form-control mb-2" placeholder="Digite ou use o GPS" required>

            <button type="button" onclick="pegarLocalizacao()" class="btn btn-outline-secondary w-100 mb-3">
                📍 Usar minha localização
            </button>

            <label class="form-label">Foto</label>
            <input type="file" name="imagem" accept="image/*" class="form-control">

            <button class="btn btn-success w-100">🚨 Enviar Denúncia</button>

        </form>

    </div>

</div>

<!-- 🔥 SCRIPT FICA AQUI (SEMPRE ANTES DO </body>) -->
<script>
function pegarLocalizacao() {

    if (!navigator.geolocation) {
        alert("Seu navegador não suporta GPS");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        function(pos) {
            document.getElementById("localizacao").value =
                pos.coords.latitude + "," + pos.coords.longitude;
        },
        function(error) {
            alert("Não foi possível obter localização. Verifique as permissões.");
        }
    );
}
</script>

<script>
window.onload = function() {
    pegarLocalizacao();
}
</script>

</body>
</html>
