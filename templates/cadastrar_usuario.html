<!DOCTYPE html>
<html>
<head>
    <title>Cadastrar Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="card shadow p-4 mx-auto" style="max-width: 400px;">
        <h4 class="text-center mb-3">👤 Novo Usuário</h4>

        <form method="POST">
            <input name="nome" class="form-control mb-2" placeholder="Nome" required>
            <input name="email" class="form-control mb-2" placeholder="Email" required>
            <input name="senha" type="password" class="form-control mb-3" placeholder="Senha" required>

            <select name="tipo" class="form-control mb-3">
                <option value="admin">Admin</option>
                <option value="fiscal">Fiscal</option>
            </select>

            <button class="btn btn-success w-100">Cadastrar</button>
        </form>

    </div>

</div>

</body>
</html>
