<!DOCTYPE html>
<html>
<head>
    <title>Histórico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

    <h4>📜 Histórico da Denúncia</h4>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Status</th>
                <th>Observação</th>
                <th>Usuário</th>
                <th>Data</th>
            </tr>
        </thead>

        <tbody>
            {% for h in dados %}
            <tr>
                <td>{{ h[0] }}</td>
                <td>{{ h[1] }}</td>
                <td>{{ h[2] }}</td>
                <td>{{ h[3] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
