<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body class="bg-light">

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>📊 Dashboard de Denúncias</h3>
        <a href="/painel" class="btn btn-secondary">Voltar</a>
    </div>

    <!-- TOTAL -->
    <div class="card shadow p-3 mb-4 text-center">
        <h5>Total de Denúncias</h5>
        <h2 id="total">0</h2>
    </div>

    <div class="row">

        <!-- GRÁFICO POR TIPO -->
        <div class="col-md-6 mb-4">
            <div class="card shadow p-3">
                <h5>Por Tipo</h5>
                <canvas id="graficoTipo"></canvas>
            </div>
        </div>

        <!-- GRÁFICO POR STATUS -->
        <div class="col-md-6 mb-4">
            <div class="card shadow p-3">
                <h5>Por Status</h5>
                <canvas id="graficoStatus"></canvas>
            </div>
        </div>

    </div>

</div>

<script>

fetch('/dados_dashboard')
.then(res => res.json())
.then(dados => {

    // total
    document.getElementById('total').innerText = dados.total;

    // gráfico tipo
    new Chart(document.getElementById('graficoTipo'), {
        type: 'bar',
        data: {
            labels: dados.tipos.labels,
            datasets: [{
                label: 'Denúncias por tipo',
                data: dados.tipos.valores
            }]
        }
    });

    // gráfico status
    new Chart(document.getElementById('graficoStatus'), {
        type: 'pie',
        data: {
            labels: dados.status.labels,
            datasets: [{
                data: dados.status.valores
            }]
        }
    });

});
</script>

</body>
</html>
