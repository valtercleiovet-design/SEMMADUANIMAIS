<!DOCTYPE html>
<html>
<head>
    <title>Mapa</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            background-color: #f4f6f9;
        }

        .card-mapa {
            max-width: 850px;
            margin: auto;
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        #map {
            height: 420px;
            width: 100%;
            border-radius: 12px;
            margin-top: 10px;
        }

        .endereco {
            font-size: 14px;
            color: #666;
        }

        .btn {
            transition: 0.2s ease;
            font-weight: 500;
        }

        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="card-mapa">

        <h5 class="mb-2">📍 Localização da denúncia</h5>

        <p id="endereco" class="endereco mb-3">Carregando endereço...</p>

        <div id="map"></div>

        <div class="d-flex justify-content-between mt-4">

            <a href="/painel" class="btn btn-outline-dark px-4 shadow-sm">
                ⬅ Voltar
            </a>

            <a href="https://www.google.com/maps?q={{ localizacao }}" 
               target="_blank"
               class="btn btn-success px-4 shadow-sm">
                📍 Abrir no Google Maps
            </a>

        </div>

    </div>

</div>

<script>
    var coords = "{{ localizacao }}".split(",");

    var lat = parseFloat(coords[0]);
    var lon = parseFloat(coords[1]);

    var map = L.map('map').setView([lat, lon], 16);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    L.marker([lat, lon]).addTo(map)
        .bindPopup("📍 Denúncia registrada aqui")
        .openPopup();

    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("endereco").innerText = data.display_name;
    })
    .catch(() => {
        document.getElementById("endereco").innerText = "Endereço não encontrado";
    });
</script>

</body>
</html>
