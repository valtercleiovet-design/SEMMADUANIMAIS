<!DOCTYPE html>
<html>
<head>
    <title>Novo Usuário</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">

            <h4 class="mb-3 text-center">➕ Novo Usuário</h4>

            <a href="/usuarios" class="btn btn-secondary mb-3 w-100">
                ⬅ Voltar
            </a>

            <div class="card p-4 shadow">

                <form method="POST">

                    <label class="form-label">Nome</label>
                    <input type="text" name="nome" class="form-control mb-3" required>

                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control mb-3" required>

                    <label class="form-label">Senha</label>
                    <input type="password" name="senha" class="form-control mb-3" required>

                    <label class="form-label">Tipo</label>
                    <select name="tipo" class="form-select mb-4">
                        <option value="fiscal">Fiscal</option>
                        <option value="admin">Admin</option>
                    </select>

                    <button class="btn btn-success w-100">
                        💾 Salvar
                    </button>

                </form>

            </div>

        </div>
    </div>

</div>

</body>
</html>
