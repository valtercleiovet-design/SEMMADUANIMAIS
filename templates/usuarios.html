<!DOCTYPE html>
<html>
<head>
    <title>Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">

    <h4>👥 Usuários</h4>

    <a href="/painel" class="btn btn-secondary mb-3">⬅ Voltar</a>

    <div class="card p-3 shadow">

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Tipo</th>
                </tr>
            </thead>

            <tbody>
                {% for u in dados %}
                <tr>
                    <td>{{ u[0] }}</td>
                    <td>{{ u[1] }}</td>
                    <td>{{ u[2] }}</td>
                    <td>{{ u[3] }}</td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
