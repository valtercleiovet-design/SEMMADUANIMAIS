<!DOCTYPE html>
<html>
<head>
    <title>Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">

    <h4>👥 Usuários</h4>

    <div class="d-flex gap-2 mb-3">
        <a href="/painel" class="btn btn-secondary">⬅ Voltar</a>

        <!-- 🔥 NOVO BOTÃO -->
        <a href="{{ url_for('cadastrar_usuario') }}" class="btn btn-success">
            ➕ Novo Usuário
        </a>
    </div>

    <div class="card p-3 shadow">

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Tipo</th>
                </tr>
            </thead>

            <tbody>
                {% for u in dados %}
                <tr>
                    <td>{{ u[0] }}</td>
                    <td>{{ u[1] }}</td>
                    <td>{{ u[2] }}</td>
                    <td>
                        {% if u[3] == 'admin' %}
                            <span class="badge bg-dark">Admin</span>
                        {% else %}
                            <span class="badge bg-primary">Fiscal</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
