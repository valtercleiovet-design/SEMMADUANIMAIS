<!DOCTYPE html>
<html>
<head>
    <title>Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

    <h4 class="mb-3">👥 Usuários do Sistema</h4>

    <a href="/cadastrar_usuario" class="btn btn-success mb-3">+ Novo Usuário</a>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Email</th>
                <th>Tipo</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>
            {% for u in dados %}
            <tr>
                <td>{{ u[0] }}</td>
                <td>{{ u[1] }}</td>
                <td>{{ u[2] }}</td>
                <td>
                    {% if u[3] == 'admin' %}
                        <span class="badge bg-danger">Admin</span>
                    {% else %}
                        <span class="badge bg-primary">Fiscal</span>
                    {% endif %}
                </td>

                <td>
                    <a href="/deletar_usuario/{{ u[0] }}" class="btn btn-sm btn-danger"
                       onclick="return confirm('Excluir usuário?')">
                       Excluir
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
