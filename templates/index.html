<!DOCTYPE html>
<html>
<head>
    <title>SEMMADU</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- 🔥 PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#198754">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url("/static/img/capa.png") no-repeat center center;
            background-size: cover;
        }

        .overlay {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.3);
        }

        .box {
            background: rgba(255,255,255,0.9);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
    </style>
</head>
<body>

<div class="overlay">

    <div class="box shadow">

        <h3 class="mb-3">🐾 SEMMADU</h3>

        <!-- ✅ MENSAGEM DE SUCESSO -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div id="msg" style="
                background: #28a745;
                color: white;
                padding: 12px;
                border-radius: 10px;
                margin-bottom: 15px;
                text-align: center;
                font-weight: bold;
            ">
                {{ messages[0] }}
            </div>

            <script>
                setTimeout(() => {
                    document.getElementById("msg").style.display = "none";
                }, 3000);
            </script>
          {% endif %}
        {% endwith %}

        <a href="/denunciar" class="btn btn-success w-100 mb-3">
            🚨 Fazer Denúncia
        </a>

        <a href="/login" class="btn btn-outline-dark w-100">
            🔐 Área do Servidor
        </a>

        <a href="/consulta" class="btn btn-outline-primary w-100 mt-2">
            🔎 Consultar Denúncia
        </a>

    </div>

</div>

<!-- 🔥 ATIVAR SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/sw.js")
        .then(() => console.log("Service Worker ativo"))
        .catch(err => console.log("Erro:", err));
}
</script>

</body>
</html>
